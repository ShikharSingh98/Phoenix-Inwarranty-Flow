name: Postman Collection Workflow

on:
  push: 
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: '30 02 * * *'
    - cron: '00 14 * * *'

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code 
        uses: actions/checkout@v7.0.0
        
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          
      - name: Install newman and newman-reporter-htmlextra
        run: |
            npm i -g newman
            npm i -g newman-reporter-htmlextra
            
      - name: Run Postman Collection
        run: |
          newman run 'Inwarranty-Flow External Data.postman_collection.json' \
          -e 'QA.postman_environment.json' \
          -r cli,htmlextra \
          -d 'testdata.csv'
          
      - name: Archive generated newman report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with: 
          name: Newman Report
          path: newman/*.html
            
